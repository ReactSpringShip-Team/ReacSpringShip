spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: postgres
    password: postgres
    driverClassName: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: -1

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-on-validation-error: true

  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true

    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: "password-example-123456789-new-encoded-256-bits"

jwt:
  expiration: 86400000
  issuer: "http://localhost:8080"

springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, env, loggers
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

cors:
  allowed-origins: http://localhost:5173
  allowed-methods: "*"
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG