spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:testdb
    username: user
    password:
    driverClassName: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
      show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: "password-example-123456789-new-encoded-256-bits"

jwt:
  expiration: 86400000
  issuer: "http://localhost:8080"

springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true

logging:
  level:
    web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG