spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driverClassName: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: -1
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-on-validation-error: false

  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: false

    open-in-view: false

jwt:
  expiration: 86400000
  issuer: ${APP_BASE_URL}
  secret-key: ${JWT_SECRET}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: false

features:
  auth:
    enabled: ${FEATURE_AUTH}
  rooms:
    enabled: ${FEATURE_ROOMS}
  ranking:
    enabled: ${FEATURE_RANKING}
  score:
    enabled: ${FEATURE_SCORE}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    root: WARN
    com.C2E.ReacSpringShip: INFO
    org.springframework.security: WARN
    org.hibernate: WARN