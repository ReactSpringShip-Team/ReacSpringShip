services:
  postgres:
    image: postgres:18.3
    environment:
      ## Only during the development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devDB

      ## To ensure it accepts external connections before the backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devDB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s  
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/18/main
    networks:
      - app-network
      
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/devDB
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge